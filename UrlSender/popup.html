<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Url Sender</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <h1>Url Sender</h1>
      <p class="intro">访问新地址时，按下面的规则自动切换中英文输入模式。</p>

      <form id="settings-form">
        <label class="field">
          <span>后台地址</span>
          <input
            id="baseUrl"
            name="baseUrl"
            type="url"
            placeholder="http://127.0.0.1:5998"
            spellcheck="false"
          >
        </label>

        <label class="field">
          <span>中文输入法网址规则</span>
          <div class="rule-builder">
            <select id="chineseRuleType" aria-label="中文规则匹配方式">
              <option value="keyword">关键词</option>
              <option value="domain">域名</option>
              <option value="prefix">前缀</option>
              <option value="regex">正则</option>
            </select>
            <input
              id="chineseRuleValue"
              type="text"
              placeholder="输入关键词"
              spellcheck="false"
            >
            <button id="addChineseRule" class="add-rule-button" type="button">添加</button>
          </div>
          <textarea
            id="chinesePatterns"
            name="chinesePatterns"
            rows="6"
            placeholder="关键词: docs
域名: baidu.com
前缀: https://baidu.com/query
正则: ^https://mail\\.qq\\.com/"
            spellcheck="false"
          ></textarea>
        </label>

        <label class="field">
          <span>英文输入法网址规则</span>
          <div class="rule-builder">
            <select id="englishRuleType" aria-label="英文规则匹配方式">
              <option value="keyword">关键词</option>
              <option value="domain">域名</option>
              <option value="prefix">前缀</option>
              <option value="regex">正则</option>
            </select>
            <input
              id="englishRuleValue"
              type="text"
              placeholder="输入关键词"
              spellcheck="false"
            >
            <button id="addEnglishRule" class="add-rule-button" type="button">添加</button>
          </div>
          <textarea
            id="englishPatterns"
            name="englishPatterns"
            rows="6"
            placeholder="关键词: github
域名: github.com
前缀: https://stackoverflow.com/questions
正则: ^https://.*\\.example\\.com/"
            spellcheck="false"
          ></textarea>
        </label>

        <div class="tips">
          <p>每行一种规则：关键词、域名、前缀、正则。</p>
          <p>域名必须完全相同，子域名不会命中。</p>
          <p>前缀会匹配相同协议、域名和路径下级，查询参数不影响命中。</p>
          <p>中文规则优先于英文规则。</p>
          <p>命中后插件图标会短暂显示 CN / EN / ERR。</p>
        </div>

        <button class="save-button" type="submit">保存配置</button>
        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
